# EJB Vision-Language Model Configuration
# Author: Eduardo J. Barrios (@edujbarrIos)

project:
  name: "EJB-VLM"
  author: "Eduardo J. Barrios"
  github: "edujbarrIos"
  version: "0.1.0"
  description: "Eduardo J. Barrios Vision-Language Model - Zero-Shot VLM using CLIP and GPT-2"

# Model Configuration
models:
  clip:
    model_name: "ViT-B/32"
    # Available: "RN50", "RN101", "RN50x4", "RN50x16", "RN50x64", "ViT-B/32", "ViT-B/16", "ViT-L/14"
    device: "auto"  # auto, cuda, or cpu
  
  gpt:
    model_name: "gpt2"
    # Available: "gpt2", "gpt2-medium", "gpt2-large", "gpt2-xl"
    device: "auto"  # auto, cuda, or cpu
    use_cache: true

# Text Generation Parameters
generation:
  default:
    max_length: 50
    min_length: 10
    temperature: 0.7
    top_p: 0.9
    top_k: 50
    num_beams: 5
    num_return_sequences: 1
    no_repeat_ngram_size: 2
    early_stopping: true
  
  creative:
    max_length: 60
    temperature: 1.0
    top_p: 0.95
    num_beams: 3
  
  focused:
    max_length: 50
    temperature: 0.5
    top_p: 0.85
    num_beams: 8
  
  detailed:
    max_length: 80
    temperature: 0.7
    top_p: 0.9
    num_beams: 10

# Category Detection
categories:
  default:
    - "person"
    - "animal"
    - "vehicle"
    - "building"
    - "nature"
    - "food"
    - "indoor scene"
    - "outdoor scene"
    - "object"
    - "sports"
    - "technology"
    - "art"
  
  extended:
    - "person"
    - "people"
    - "animal"
    - "dog"
    - "cat"
    - "bird"
    - "vehicle"
    - "car"
    - "bicycle"
    - "building"
    - "architecture"
    - "nature"
    - "landscape"
    - "mountain"
    - "ocean"
    - "forest"
    - "food"
    - "meal"
    - "indoor scene"
    - "outdoor scene"
    - "object"
    - "sports"
    - "technology"
    - "computer"
    - "art"
    - "painting"

# Image Context Templates
templates:
  basic:
    - "a photo of"
    - "an image showing"
    - "a picture of"
    - "this is"
    - "there is"
  
  extended:
    - "a photo of"
    - "an image showing"
    - "a picture of"
    - "this is"
    - "there is"
    - "the image contains"
    - "showing"
    - "depicting"
    - "featuring"
    - "with"

# Batch Processing
batch:
  max_workers: 4
  chunk_size: 10
  show_progress: true

# Image Processing
image:
  max_size: [800, 800]
  supported_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".bmp"
    - ".gif"
    - ".tiff"
    - ".webp"
  resize_before_processing: false

# Paths
paths:
  data_dir: "data"
  output_dir: "output"
  cache_dir: "cache"
  results_dir: "results"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  save_to_file: false
  log_file: "logs/ejb_vlm.log"

# Benchmarking
benchmark:
  num_runs: 5
  warmup_runs: 1
  report_format: "detailed"  # simple, detailed, json

# Demo Settings
demo:
  sample_image_url: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800"
  default_image_name: "demo_image.jpg"
  num_descriptions: 3
  show_categories: true
  show_progress: true
